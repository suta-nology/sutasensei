<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suta Sensei — N4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
    />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>
  <body>
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()" aria-label="Back">←</button>
      <div class="topbar-right">
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
          🌙
        </button>
        <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">
          EN
        </button>
      </div>
    </div>

    <div class="container">
      <h1 data-lang="pilihN4">Pilih Materi N4</h1>
      <p data-lang="pilihN4Desc">Mau belajar apa hari ini?</p>

      <div
        class="material-grid"
        style="
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          max-width: 480px;
        "
      >
        <!-- KOTOBA N4 -->
        <div class="material-card" onclick="window.location.href = 'kotoba-n4.html'">
          <span class="mat-icon">📖</span>
          <span class="mat-name" data-lang="kotoba">KOTOBA</span>
          <span class="mat-badge badge-free" data-lang="free">FREE</span>
          <div class="mat-progress-wrap" id="prog-kotobaN4" style="display:none">
            <div class="mat-progress-bar"><div class="mat-progress-fill"></div></div>
            <span class="mat-progress-pct"></span>
          </div>
        </div>

        <!-- BUNPOU N4 -->
        <div class="material-card" onclick="window.location.href = 'bunpou-n4.html'">
          <span class="mat-icon">✏️</span>
          <span class="mat-name" data-lang="bunpou">BUNPOU</span>
          <span class="mat-badge badge-free" data-lang="free">FREE</span>
          <div class="mat-progress-wrap" id="prog-bunpouN4" style="display:none">
            <div class="mat-progress-bar"><div class="mat-progress-fill"></div></div>
            <span class="mat-progress-pct"></span>
          </div>
        </div>

        <!-- KANJI N4 -->
        <div class="material-card" onclick="window.location.href = 'kanji-n4.html'">
          <span class="mat-icon">漢</span>
          <span class="mat-name" data-lang="kanji">KANJI</span>
          <span class="mat-badge badge-free" data-lang="free">FREE</span>
          <div class="mat-progress-wrap" id="prog-kanjiN4" style="display:none">
            <div class="mat-progress-bar"><div class="mat-progress-fill"></div></div>
            <span class="mat-progress-pct"></span>
          </div>
        </div>

        <!-- QUIZ N4 -->
        <div
          class="material-card"
          onclick="window.location.href = 'quiz-n4.html'"
        >
          <span class="mat-icon">📝</span>
          <span class="mat-name" data-lang="pilihQuizN4">QUIZ N4</span>
          <span class="mat-sub" style="font-size: 0.65rem; opacity: 0.7"
            >Kotoba + Bunpou</span
          >
          <span class="mat-badge badge-free" data-lang="free">FREE</span>
        </div>

        <!-- QUIZ KANJI N4 -->
        <div
          class="material-card"
          onclick="window.location.href = 'quiz-kanji-n4.html'"
        >
          <span class="mat-icon">🔠</span>
          <span class="mat-name" data-lang="pilihQuizKanjiN4">QUIZ KANJI</span>
          <span class="mat-sub" style="font-size: 0.65rem; opacity: 0.7"
            >N4 Kanji</span
          >
          <span class="mat-badge badge-free" data-lang="free">FREE</span>
        </div>
      </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/core.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        [
          { key: "kotobaN4", total: kotobaN4.length, id: "prog-kotobaN4" },
          { key: "bunpouN4", total: bunpouN4.length, id: "prog-bunpouN4" },
          { key: "kanjiN4",  total: kanjiN4.length,  id: "prog-kanjiN4"  },
        ].forEach(({ key, total, id }) => {
          const pct  = typeof getSeenPercent === "function" ? getSeenPercent(key, total) : 0;
          const wrap = document.getElementById(id);
          if (!wrap || pct === 0) return;
          wrap.style.display = "block";
          wrap.querySelector(".mat-progress-fill").style.width = pct + "%";
          wrap.querySelector(".mat-progress-pct").textContent  = pct + "% ✓";
        });
      });
    </script>
  </body>
</html>
