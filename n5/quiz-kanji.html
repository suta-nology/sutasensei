<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suta Sensei — Quiz Kanji N5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
    />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>
  <body>
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()" aria-label="Back">←</button>
      <div class="topbar-right">
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
          🌙
        </button>
        <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">
          EN
        </button>
      </div>
    </div>
    <div class="container">
      <div class="quiz-wrap">
        <div class="quiz-progress">
          <div class="quiz-bar">
            <div class="quiz-fill" id="quizFill" style="width: 0%"></div>
          </div>
          <span class="quiz-counter" id="quizCounter"></span>
        </div>
        <div id="quizStart" class="quiz-start-box">
          <h1 data-lang="quizKanjiPageTitle">Quiz Kanji N5</h1>
          <p style="margin-bottom: 16px" data-lang="quizKanjiPageDesc">
            Uji kemampuan Kanji N5mu
          </p>
          <p class="quiz-free-note" id="quizFreeNote"></p>
          <button
            class="btn-primary"
            onclick="startQuiz()"
            data-lang="quizStart"
          >
            Mulai Quiz
          </button>
        </div>
        <div id="quizPlay" class="hidden">
          <div class="quiz-card">
            <p class="quiz-type-label" id="quizTypeLabel"></p>
            <p class="quiz-jp" id="quizJP"></p>
            <p class="quiz-sub" id="quizSub"></p>
            <div class="quiz-options" id="quizOptions"></div>
            <p class="quiz-feedback" id="quizFeedback"></p>
          </div>
          <button
            class="quiz-next-btn hidden"
            id="quizNext"
            onclick="nextQuestion()"
            data-lang="quizNext"
          >
            Selanjutnya →
          </button>
        </div>
        <div id="quizResult" class="quiz-result-box hidden">
          <p class="quiz-score-val" id="quizScoreVal">0 / 0</p>
          <p class="quiz-score-msg" id="quizScoreMsg"></p>
          <p class="quiz-grade-msg" id="quizGradeMsg"></p>
          <button
            class="btn-primary"
            onclick="retryQuiz()"
            data-lang="quizRetry"
          >
            Coba Lagi
          </button>
          <button
            class="menu-btn menu-btn-ghost"
            style="margin-top: 8px"
            onclick="goBack()"
            data-lang="quizBack"
          >
            ← Kembali
          </button>
        </div>
      </div>
    </div>
    <script src="../js/data.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/quiz-kanji.js"></script>
  </body>
</html>
